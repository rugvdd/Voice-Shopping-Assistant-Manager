<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Voice Cart — Voice Command Shopping Assistant</title>
<meta name="description" content="A voice-first shopping list manager with smart suggestions." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">

  <header class="app-header">
    <p class="eyebrow">Voice Cart</p>
    <h1>Say it, and it's on the list.</h1>
    <div class="lang-picker">
      <label for="langSelect">Language</label>
      <select id="langSelect" aria-label="Voice recognition language"></select>
    </div>
  </header>

  <!-- Signature element: mic + live "receipt tape" transcript -->
  <section class="voice-console" aria-label="Voice input">
    <button id="micBtn" class="mic-btn" aria-label="Tap to speak">
      <svg id="waveform" class="waveform" viewBox="0 0 64 32" aria-hidden="true">
        <rect x="2" y="12" width="4" height="8" rx="2"></rect>
        <rect x="10" y="6" width="4" height="20" rx="2"></rect>
        <rect x="18" y="0" width="4" height="32" rx="2"></rect>
        <rect x="26" y="8" width="4" height="16" rx="2"></rect>
        <rect x="34" y="2" width="4" height="28" rx="2"></rect>
        <rect x="42" y="10" width="4" height="12" rx="2"></rect>
        <rect x="50" y="4" width="4" height="24" rx="2"></rect>
        <rect x="58" y="12" width="4" height="8" rx="2"></rect>
      </svg>
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="1.6"/>
        <path d="M19 11a7 7 0 0 1-14 0M12 18v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <p id="micStatus" class="mic-status">Tap to speak</p>

    <form id="textFallbackForm" class="text-fallback" role="search">
      <input id="textFallbackInput" type="text" placeholder='Or type: "add 2 apples"' autocomplete="off" />
      <button type="submit" aria-label="Send command">→</button>
    </form>

    <div id="transcriptFeed" class="transcript-feed" aria-live="polite"></div>
  </section>

  <!-- Smart suggestions -->
  <section class="suggestions-section" aria-label="Smart suggestions">
    <h2 class="section-title">Suggested for you</h2>
    <div id="suggestionsTray" class="suggestions-tray"></div>
  </section>

  <!-- Shopping list -->
  <section class="list-section" aria-label="Shopping list">
    <div class="list-header">
      <h2 class="section-title">Your list <span id="itemCount" class="count-badge">0</span></h2>
    </div>
    <div id="emptyState" class="empty-state">
      <p>Your list is empty.</p>
      <p class="muted small">Try saying “add milk” or “I need bananas.”</p>
    </div>
    <div id="listContainer"></div>
  </section>

</div>

<!-- Search results overlay (voice-activated search) -->
<div id="searchResults" class="search-overlay hidden">
  <div class="search-panel">
    <div class="search-panel-header">
      <h2>Search results</h2>
      <button id="closeSearch" aria-label="Close search results">×</button>
    </div>
    <div id="searchResultsList"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="data.js"></script>
<script src="nlp.js"></script>
<script src="speech.js"></script>
<script src="app.js"></script>
</body>
</html>
